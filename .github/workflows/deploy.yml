name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # nw (the desktop runtime) isn't needed to build the web bundle and its
      # install script downloads a large binary, so skip lifecycle scripts and
      # rebuild only esbuild (which needs its platform binary for `pnpm build`).
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm rebuild esbuild

      - run: pnpm build

      # deploy-pages serves the artifact as-is (no Jekyll), but .nojekyll is
      # harmless insurance against any underscore-prefixed asset names.
      - run: touch dist/.nojekyll

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
